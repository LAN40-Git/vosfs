syntax = "proto3";
package vosfs.auth;

message User {
  int64 uid = 1;
  string user_name = 2;
  bytes avatar = 3;
  string email = 4;
  string phone = 5;
  string password = 6;
  Role role = 7;
  Status status = 8;
  uint64 quota = 9;
  int64 create_time = 10;
  int64 modify_time = 11;
  int64 last_access_time = 12;
  string last_access_ip = 13;

  enum Status {
    kEnabled = 0;
    kDisabled = 1;
    kDeleted = 2;
  }

  enum Role {
    kAdmin = 0;
    kUser = 1;
  }
}

message RegisterUserRequest {
  string user_name = 1;
  string password = 2;
  User.Role role = 3;
  string admin_secret = 4;
}

message DeleteUserRequest {
  string token = 1;
  string password = 2;
}

message LoginUserByNameRequest {
  string user_name = 1;
  string password = 2;
  User.Role role = 3;
}

message LoginUserByNameResponse {
  string token = 1;
  string user_name = 2;
  bytes avatar = 3;
  string email = 4;
  string phone = 5;
  string create_time = 6;
}

message LogoutUserRequest {
  string token = 1;
}

message UpdateUserNameRequest {
  int64 uid = 1;
  string new_user_name = 2;
  string token = 3;
}

message UpdateUserAvatarRequest {
  int64 uid = 1;
  bytes new_avatar = 2;
  string token = 3;
}

message UpdateUserPasswordRequest {
  string token = 1;
  string new_password = 2;
}

message UpdateUserRoleRequest {
  string token = 1;
  User.Role new_role = 2;
}

message UpdateStatusRequest {
  string token = 1;
  User.Status new_status = 2;
}

message UpdateQuotaRequest {
  string token = 1;
  int64 new_quota = 2;
}