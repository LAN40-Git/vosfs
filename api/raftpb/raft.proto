syntax = "proto3";
package vosfs.raft;

message HardState {
  uint64 current_term = 1;
  optional uint64 voted_for = 2;
}

message RequestVoteRequest {
  uint64 term = 1;
  uint64 candidate_id = 2;
  uint64 last_log_index = 3;
  uint64 last_log_term = 4;
}

message RequestVoteResponse {
  uint64 id = 1;
  uint64 term = 2;
  bool vote_granted = 3;
}

message LogEntry {
  uint64 term = 1;
  uint64 index = 2;
  bytes command = 3;
}

message AppendEntriesRequest {
  uint64 term = 1;
  uint64 leader_id = 2;
  uint64 prev_log_index = 3;
  uint64 prev_log_term = 4;
  repeated LogEntry entries = 5;
  uint64 leader_commit = 6;
}

message AppendEntriesResponse {
  uint64 id = 1;
  uint64 term = 2;
  bool success = 3;
  uint64 last_log_index = 4;
  optional uint64 conflict_index = 5;
}

message Snapshot {
  uint64 last_included_index = 1;
  uint64 last_included_term = 2;
  map<uint64, Inode> inodes = 3;
}

message InstallSnapshotRequest {
  uint64 term = 1;
  uint64 leader_id = 2;
  uint64 last_included_index = 3;
  uint64 last_included_term = 4;
  uint64 offset = 5;
  bytes data = 6;
  bool done = 7;
}

message InstallSnapshotResponse {
  uint64 id = 1;
  uint64 term = 2;
}

message BlockInfo {
  uint64 id = 1;
  uint64 offset = 2;
  uint64 size = 3;
  string host = 4;
  uint32 port = 5;
}

message Inode {
  uint64 ino = 1;
  uint32 mode = 2;
  uint64 uid = 3;
  uint64 gid = 4;
  uint64 atime = 5;
  uint64 ctime = 6;
  uint64 mtime = 7;
  uint64 size = 8;
  uint32 nlink = 9;
  repeated BlockInfo blocks = 10;
  DirEntries dir = 11;
}

message DirEntries {
  map<string, uint64> entries = 1;
}

message EntryCommand {
  oneof cmd {
    RequestBlocksAddressRequest request_blocks_address = 1;
    ListDirRequest list_dir = 2;
  }
}

message RequestBlocksAddressRequest {
  string token = 1;
  repeated BlockInfo blocks = 2;
}

message RequestBlocksAddressResponse {
  uint32 status_code = 1;
  string message = 2;
  repeated BlockInfo blocks = 3;
}

message ListDirRequest {
  string token = 1;
  uint64 parent_ino = 2;
}

message ListDirResponse {
  uint32 status_code = 1;
  string message = 2;
  repeated Inode inodes = 3;
}

message CreateDirRequest {
  string token = 1;
  uint64 parent_ino = 2;
}

message CreateDirResponse {
  uint32 status_code = 1;
  string message = 2;
  Inode inode = 3;
}