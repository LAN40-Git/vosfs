syntax = "proto3";
package vosfs.raft;

message HardState {
  uint64 current_term = 1;
  optional uint64 voted_for = 2;
}

message RequestVoteRequest {
  uint64 term = 1;
  uint64 candidate_id = 2;
  uint64 last_log_index = 3;
  uint64 last_log_term = 4;
}

message RequestVoteResponse {
  uint64 id = 1;
  uint64 term = 2;
  bool vote_granted = 3;
}

message LogEntry {
  uint64 term = 1;
  uint64 index = 2;
  bytes command = 3;
}

message AppendEntriesRequest {
  uint64 term = 1;
  uint64 leader_id = 2;
  uint64 prev_log_index = 3;
  uint64 prev_log_term = 4;
  repeated LogEntry entries = 5;
  uint64 leader_commit = 6;
}

message AppendEntriesResponse {
  uint64 id = 1;
  uint64 term = 2;
  bool success = 3;
  uint64 last_log_index = 4;
  optional uint64 conflict_index = 5;
}

message Snapshot {
  uint64 last_included_index = 1;
  uint64 last_included_term = 2;
  repeated Inode inodes = 3;
  repeated DirEntry dir_entries = 4;
}

message InstallSnapshotRequest {
  uint64 term = 1;
  uint64 leader_id = 2;
  uint64 last_included_index = 3;
  uint64 last_included_term = 4;
  uint64 offset = 5;
  bytes data = 6;
  bool done = 7;
}

message InstallSnapshotResponse {
  uint64 id = 1;
  uint64 term = 2;
}

message BlockInfo {
  uint64 id = 1;
  uint64 ino = 2;
  uint64 offset = 3;
  uint64 size = 4;
  repeated uint64 data_node_id = 5;
}

message Inode {
  uint64 ino = 1;
  uint32 mode = 2;
  bool   is_dir = 3;
  uint64 size = 4;
  uint64 ctime = 5;
  uint64 mtime = 6;
  uint32 nlink = 8;
  repeated BlockInfo blocks = 9;
  repeated DirEntry dir_entries = 10;
}

message DirEntry {
  uint64 ino = 1;
  string name = 2;
  string path = 3;
  bool is_dir = 4;
  uint64 size = 5;
  uint64 ctime = 6;
  uint64 mtime = 7;
}

message EntryCommand {
  // 只有写请求会被包装成 Raft 日志
  oneof type {
    MakeDirRequest mkdir = 1;
    UploadFileRequest upload_file = 2;
  }
}

message PendingResponse {
  oneof type {
    MakeDirResponse mkdir = 1;
    UploadFileResponse upload_file = 2;
  }
}

message ListDirRequest {
  string token = 1;
  string path = 2;
}

message ListDirResponse {
  uint32 status_code = 1;
  string message = 2;
  string path = 3;
  repeated DirEntry dir_entries = 4;
}

message MakeDirRequest {
  string token = 1;
  string parent_path = 2;
  string name = 3;
  uint64 timestamp = 4;
}

message MakeDirResponse {
  uint32 status_code = 1;
  string message = 2;
  string parent_path = 3;
}

message PrepareUploadFileRequest {
  string token = 1;
  string local_path = 2;
  string remote_path = 3;
  repeated BlockInfo blocks = 4;
}

message PrepareUploadFileResponse {
  uint32 status_code = 1;
  string message = 2;
  string local_path = 3;
  string remote_path = 4;
  repeated BlockInfo blocks = 5;
}

message PrepareDownloadFileRequest {
  string token = 1;
  string local_path = 2;
  string remote_path = 3;
}

message PrepareDownloadFileResponse {
  uint32 status_code = 1;
  string message = 2;
  string local_path = 3;
  string remote_path = 4;
  repeated BlockInfo blocks = 5;
}

message UploadFileRequest {
  string token = 1;
  uint64 ino = 2;
  string path = 3;
  repeated BlockInfo blocks = 4;
}

message UploadFileResponse {
  uint32 status_code = 1;
  string message = 2;
  uint64 ino = 3;
}

message UploadBlockRequest {
  string token = 1;
  uint64 block_id = 2;
  uint64 ino = 3;
  bytes data = 4;
}

message UploadBlockResponse {
  uint32 status_code = 1;
  string message = 2;
  uint64 block_id = 3;
  uint64 ino = 4;
  uint64 data_node_id = 5;
}

message DownloadBlockRequest {
  string token = 1;
  uint64 block_id = 2;
  uint64 ino = 3;
}

message DownloadBlockResponse {
  uint32 status_code = 1;
  string message = 2;
  uint64 block_id = 3;
  uint64 ino = 4;
  uint64 data_node_id = 5;
  bytes data = 6;
}