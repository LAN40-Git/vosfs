syntax = "proto3";
package vosfs.raft;

message HardState {
    uint64 current_term = 1;
    optional uint64 voted_for = 2;
    uint64 commit_index = 3;
}

message RequestVoteRequest {
    uint64 term = 1;
    uint64 candidate_id = 2;
    uint64 last_log_index = 3;
    uint64 last_log_term = 4;
}

message RequestVoteResponse {
    uint64 id = 1;
    uint64 term = 2;
    bool vote_granted = 3;
}

message LogEntry {
    uint64 term = 1;
    uint64 index = 2;
    bytes command = 3;
}

message AppendEntriesRequest {
    uint64 term = 1;
    uint64 leader_id = 2;
    uint64 prev_log_index = 3;
    uint64 prev_log_term = 4;
    repeated LogEntry entries = 5;
    uint64 leader_commit = 6;
}

message AppendEntriesResponse {
    uint64 id = 1;
    uint64 term = 2;
    bool success = 3;
    uint64 last_log_index = 4;
    optional uint64 conflict_index = 5;
}

message NodeInfo {
    uint64 id = 1;
    string name = 2;
    string host = 3;
}

message ClusterInfo {
    uint64 id = 1;
    repeated NodeInfo node_infos = 2;
}

message SnapshotMetadata {
    uint64 last_included_index = 1;
    uint64 last_included_term = 2;
}

message Snapshot {
    bytes data = 1; // 状态机的二进制数据
    SnapshotMetadata snapshot_metadata = 2;
    repeated NodeInfo node_infos = 3;
}

message InstallSnapshotRequest {
    uint64 term = 1;
    uint64 leader_id = 2;
    uint64 last_included_index = 3;
    uint64 last_included_term = 4;
    uint64 offset = 5;
    bytes data = 6;
    bool done = 7;
}

message InstallSnapshotResponse {
    uint64 id = 1;
    uint64 term = 2;
}

message ChunkInfo {
    uint32 id = 1;
    uint64 offset = 2;
    uint64 size = 3;
}

message FileInfo {
    uint64 id = 1;
    string path = 2;
    string name = 3;
    uint64 size = 4;
    bool is_dir = 5;
    uint64 parent_id = 6;
}

message UploadFileRequest {
    FileInfo file_info = 1;
    repeated ChunkInfo chunk_infos = 2;
    string checksum = 3; // MD5
}

message DownloadFileRequest {

}

message DeleteFileRequest {

}

message CreateFileRequest {

}

message CreateDirRequest {

}

message ListFileRequest {

}

message ListDirRequest {

}

message ClientCommand {
    oneof cmd {
        UploadFileRequest upload_file = 1;
    }
}