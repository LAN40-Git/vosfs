syntax = "proto3";
package vosfs.auth;

message AccountInfo {
  uint64 uid = 1;
  string name = 2;
  string hash_password = 3;
}

message PutAccountRequest {
  string name = 1;
  string hash_password = 2;
}

message PutAccountResponse {
  optional AccountInfo account_info = 1;
}

message GetAccountRequest {
  string name = 1;
  string password = 2;
}

message GetAccountResponse {
  uint64 uid = 1;
  bool success = 2;
  string msg = 3;
}

message UpdateAccountRequest {
  string name = 1;
}

message UpdateAccountResponse {
  bool success = 1;
  string msg = 2;
}

message DeleteAccountRequest {
  uint64 uid = 1;
}

message DeleteAccountResponse {
  bool success = 1;
  string msg = 2;
}