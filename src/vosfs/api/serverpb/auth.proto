syntax = "proto3";
package vosfs.auth;

enum Role {
  kAdmin = 0;
  kUser = 1;
}

enum Status {
  kEnabled = 0;
  kDisabled = 1;
}

message User {
  uint64 uid = 1;
  string name = 2;
  string hashed_password = 3;
  Role role = 4;
  Status status = 5;
  int64 create_time = 6;
  int64 modify_time = 7;
  int64 last_login_time = 8;
  string last_login_ip = 9;
}

message PutUserRequest {
  string name = 1;
  string hashed_password = 2;
  Role role = 3;
}

message PutUserResponse {
  bool success = 1;
  string msg = 2;
}

message GetUserRequest {
  string name = 1;
  string hashed_password = 2;
  Role role = 3;
}

message GetUserResponse {
  bool success = 1;
  string msg = 2;
  uint64 uid = 3;
  string name = 4;
  Role role = 5;
  int64 create_time = 6;
}

message UpdateUserNameRequest {
  uint64 uid = 1;
  string name = 2;
}

message UpdateUserNameResponse {
  bool success = 1;
  string msg = 2;
}

message UpdateUserPasswordRequest {
  uint64 uid = 1;
  string hashed_password = 2;
}

message UpdateUserPasswordResponse {
  bool success = 1;
  string msg = 2;
}

message UpdateUserRoleRequest {
  uint64 uid = 1;
  Role role = 2;
}

message UpdateUserRoleResponse {
  bool success = 1;
  string msg = 2;
}

message DeleteUserRequest {
  uint64 uid = 1;
  string hashed_password = 2;
}

message DeleteUserResponse {
  bool success = 1;
  string msg = 2;
}