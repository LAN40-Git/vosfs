syntax = "proto3";
package vosfs.auth;

enum Role {
  kAdmin = 0;
  kUser = 1;
}

enum Status {
  kEnabled = 0;
  kDisabled = 1;
}

message User {
  uint64 uid = 1;
  string name = 2;
  string hashed_password = 3;
  Role role = 4;
  Status status = 5;
  uint64 create_time = 6;
  uint64 modify_time = 7;
  uint64 last_login_time = 8;
  string last_login_ip = 9;
}

message PutUserRequest {
  string name = 1;
  string hashed_password = 2;
}

message PutUserResponse {
  optional User user = 1;
}

message GetUserRequest {
  string name = 1;
  string hashed_password = 2;
}

message GetUserResponse {
  uint64 uid = 1;
  bool success = 2;
  string msg = 3;
}

message UpdateUserRequest {
  string name = 1;
}

message UpdateUserResponse {
  bool success = 1;
  string msg = 2;
}

message DeleteUserRequest {
  uint64 uid = 1;
}

message DeleteUserResponse {
  bool success = 1;
  string msg = 2;
}